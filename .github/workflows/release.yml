name: Build and Release

on:
  push:
    branches: [main]
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v1.0.0)'
        required: false
        default: 'dev-build'

jobs:
  build-and-release:
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          
      - name: Install dependencies
        run: npm install
        
      - name: Get app name and version
        id: app_info
        run: |
          APP_NAME=$(node -p "require('./package.json').name")
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          echo "app_name=$APP_NAME" >> $GITHUB_OUTPUT
          echo "package_version=$PACKAGE_VERSION" >> $GITHUB_OUTPUT
          echo "App name: $APP_NAME"
          echo "Package version: $PACKAGE_VERSION"
        
      - name: Build Windows executable
        run: npx @electron/packager . ${{ steps.app_info.outputs.app_name }} --out=dist --icon=assets/cat.ico --overwrite --platform=win32
        
      - name: Determine version and create tag
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            VERSION="${{ github.event.inputs.version }}"
          elif [[ "${{ github.ref }}" == refs/tags/* ]]; then
            VERSION="${{ github.ref_name }}"
          else
            # For branch builds, use package.json version with branch name
            BRANCH_NAME="${{ github.ref_name }}"
            # Sanitize and truncate branch name for tag (max 30 chars)
            BRANCH_SAFE=$(echo "$BRANCH_NAME" | sed 's/[^a-zA-Z0-9._-]/-/g' | cut -c1-30)
            VERSION="v${{ steps.app_info.outputs.package_version }}-${BRANCH_SAFE}-$(date +'%Y%m%d%H%M%S')"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"
        
      - name: Create ZIP archive
        run: |
          cd dist
          # Find the packaged app directory (should match app_name-platform-arch)
          APP_DIR=$(find . -maxdepth 1 -type d -name "${{ steps.app_info.outputs.app_name }}-*" | head -n 1)
          if [ -n "$APP_DIR" ]; then
            cd "$APP_DIR"
            zip -r "../../${{ steps.app_info.outputs.app_name }}-${{ steps.version.outputs.version }}-win32.zip" .
            cd ../..
          else
            echo "Error: Could not find packaged app directory"
            exit 1
          fi
        
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.app_info.outputs.app_name }}-${{ steps.version.outputs.version }}
          path: ${{ steps.app_info.outputs.app_name }}-${{ steps.version.outputs.version }}-win32.zip
          
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: Release ${{ steps.version.outputs.version }}
          body: |
            ## ${{ steps.app_info.outputs.app_name }} ${{ steps.version.outputs.version }}
            
            ### Windows Build
            
            Download the ZIP file below and extract it to use the application.
            
            **Installation:**
            1. Download `${{ steps.app_info.outputs.app_name }}-${{ steps.version.outputs.version }}-win32.zip`
            2. Extract the ZIP file to your desired location
            3. Run `${{ steps.app_info.outputs.app_name }}.exe`
            
            **Configuration:**
            - Config file location: `%APPDATA%/${{ steps.app_info.outputs.app_name }}/config.json`
            - See [README](https://github.com/${{ github.repository }}/blob/main/README.md) for configuration options
            
            ---
            Built from commit: ${{ github.sha }}
          files: |
            ${{ steps.app_info.outputs.app_name }}-${{ steps.version.outputs.version }}-win32.zip
          draft: false
          prerelease: ${{ github.event_name == 'workflow_dispatch' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
